name: Release And Deploy Production

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: Optional image tag. Defaults to ui-YYYYMMDD-SHORTSHA
        required: false
        type: string

jobs:
  release-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    env:
      DEPLOY_DIR: /root/new-api-deploy

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Resolve image metadata
        id: meta
        shell: bash
        run: |
          REPOSITORY_LOWER=$(echo "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')
          IMAGE="ghcr.io/${REPOSITORY_LOWER}"
          if [ -n "${{ github.event.inputs.image_tag }}" ]; then
            TAG="${{ github.event.inputs.image_tag }}"
          else
            TAG="ui-$(date +'%Y%m%d')-$(git rev-parse --short HEAD)"
          fi
          echo "$TAG" > VERSION
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "full_image=${IMAGE}:${TAG}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.full_image }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Prepare SSH key
        shell: bash
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' '${{ secrets.PROD_SSH_PRIVATE_KEY }}' > ~/.ssh/prod_key
          chmod 600 ~/.ssh/prod_key
          ssh-keyscan -H "${{ secrets.PROD_SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Sync deploy assets
        shell: bash
        run: |
          REMOTE="${{ secrets.PROD_SSH_USER }}@${{ secrets.PROD_SSH_HOST }}"
          ssh -i ~/.ssh/prod_key "$REMOTE" "mkdir -p '$DEPLOY_DIR/deploy'"
          scp -O -i ~/.ssh/prod_key deploy/remote-deploy-prod.sh "$REMOTE:$DEPLOY_DIR/deploy/remote-deploy-prod.sh.upload"
          ssh -i ~/.ssh/prod_key "$REMOTE" \
            "mv '$DEPLOY_DIR/deploy/remote-deploy-prod.sh.upload' '$DEPLOY_DIR/deploy/remote-deploy-prod.sh' && chmod +x '$DEPLOY_DIR/deploy/remote-deploy-prod.sh'"

      - name: Deploy on server
        shell: bash
        run: |
          ssh -i ~/.ssh/prod_key "${{ secrets.PROD_SSH_USER }}@${{ secrets.PROD_SSH_HOST }}" \
            bash "$DEPLOY_DIR/deploy/remote-deploy-prod.sh" "${{ steps.meta.outputs.full_image }}" "$DEPLOY_DIR"

      - name: Summary
        run: |
          echo "Published and deployed image: ${{ steps.meta.outputs.full_image }}" >> $GITHUB_STEP_SUMMARY
